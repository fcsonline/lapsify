name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install ffmpeg (linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test --all-targets

# NOTE: This is the CI workflow for the repository. It lives here instead of
# .github/workflows/ci.yml only because the branch was pushed with a GitHub
# token lacking the `workflow` scope. To activate it:
#   git mv ci/github-ci.yml .github/workflows/ci.yml && rmdir ci
# and push from a terminal with workflow-scoped credentials.
